- name: update system
  apt: 
    name: "*"
    state: latest

- name: install docerk
  apt: 
    name: docker.io
    state: present   

- name: start docerk
  ansible.builtin.user:
    name: "{{ docker_users }}"
    groups: docker 
    append: true # these will ad the user in your group   


- name:  Print the docker verion 
  command: docker --version
       