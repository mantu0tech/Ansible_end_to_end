- name: Simple AWS ec2
  hosts: localhost

  vars:
    region: us-east-1
    instance_type: t3.micro
    ami_id: ami-091138d0f0d41ff90
    key_name: docker
    subnet_id: subnet-0117c966b2be2f4bf
    sg_id: sg-032cbb6d1945436ac

  tasks:
    - name: Launch EC2
      amazon.aws.ec2_instance:
        name: my-ec2
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        key_name: "{{ key_name }}"
        region: "{{ region }}"
        vpc_subnet_id: "{{ subnet_id }}"
        security_group: "{{ sg_id }}"
        count: 1
        wait: yes
        state: absent