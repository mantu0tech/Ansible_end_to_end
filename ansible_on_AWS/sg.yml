- name: Create Security Group
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: Create SG
      amazon.aws.ec2_security_group:
        name: my-ansible-sg
        description: Allow SSH
        region: ap-south-1
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: 0.0.0.0/0
      register: sg_out

    - name: Show SG ID
      debug:
        msg: "Security Group ID: {{ sg_out.group_id }}"